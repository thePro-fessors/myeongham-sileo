server {
    listen 80;
    server_name no-paper.kro.kr;

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name no-paper.kro.kr;

    ssl_certificate /etc/letsencrypt/live/no-paper.kro.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/no-paper.kro.kr/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ $uri/index.html =404;
    }

    location /api/ {
        proxy_pass http://unicard-api:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Custom 404 fallback to Next.js exported 404 page
    error_page 404 /404/index.html;
    location = /404/index.html {
        root /usr/share/nginx/html;
        internal;
    }
}
